<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>手动图片编号</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main>
    <header>
      <p class="eyebrow">MANUAL · FAST RENAME</p>
      <h1>手动图片编号</h1>
      <p class="lead">从文件夹挑图，点一下编上 1–20，确认后原地改名。不调用模型，纯手动。</p>
    </header>

    <section class="panel" id="setup-panel">
      <div class="section-head">
        <span>01</span>
        <div>
          <h2>准备</h2>
          <p>设定编号范围，选择本机图片文件夹（当前层，JPG/PNG/WebP）。</p>
        </div>
      </div>
      <div class="setup-row">
        <label class="field">
          <span>编号范围</span>
          <div class="inline">
            <span>1 到</span>
            <input id="max-number" type="number" min="1" max="200" value="20">
          </div>
        </label>
        <div class="folder-row">
          <button id="choose-folder" type="button">选择图片文件夹</button>
          <div>
            <strong id="folder-name">尚未选择</strong>
            <small id="folder-count">推荐 Chrome / Edge · 只扫描当前层</small>
          </div>
        </div>
      </div>
    </section>

    <section class="panel hidden" id="work-panel">
      <div class="section-head">
        <span>02</span>
        <div>
          <h2>点图编号</h2>
          <p id="progress">尚未编号</p>
        </div>
      </div>

      <div class="toolbar">
        <div class="modes" id="modes">
          <button type="button" class="active" data-mode="sequence">点图按序编号</button>
          <button type="button" data-mode="pick">先选号再点图</button>
        </div>
        <div class="toolbar-actions">
          <button type="button" class="secondary" id="clear-all">清空编号</button>
          <button type="button" class="secondary" id="change-folder">重选文件夹</button>
        </div>
      </div>

      <div class="number-strip-wrap">
        <div class="number-strip" id="number-strip" aria-label="编号条"></div>
      </div>
      <p class="hint" id="mode-hint">点击图片：自动分配最小空号；再点一次取消。</p>

      <div class="gallery" id="gallery"></div>

      <div class="sticky-bar">
        <div>
          <strong id="sticky-count">0 / 20</strong>
          <span id="sticky-detail">还没选图</span>
        </div>
        <button type="button" id="rename-btn" disabled>预览并改名</button>
      </div>
    </section>

    <section class="panel hidden" id="plan-panel">
      <div class="section-head">
        <span>03</span>
        <div>
          <h2>确认改名</h2>
          <p>原地重命名，不删除原图。确认名单无误后再执行。</p>
        </div>
      </div>
      <div id="plan-list" class="plan-list"></div>
      <div class="actions">
        <button type="button" class="secondary" id="back-work">返回继续选</button>
        <button type="button" id="commit-btn">确认原地改名</button>
      </div>
    </section>

    <section class="panel hidden" id="done-panel">
      <div class="section-head">
        <span>04</span>
        <div>
          <h2>完成</h2>
          <p id="done-copy"></p>
        </div>
      </div>
      <div class="actions">
        <button type="button" class="secondary" id="continue-btn">继续编剩余图片</button>
        <button type="button" id="restart-btn">重新开始</button>
      </div>
    </section>

    <p id="message" role="status"></p>
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
